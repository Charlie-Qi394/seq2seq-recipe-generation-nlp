<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Training and development loss curves</title>
  <desc id="desc">Line chart comparing no-attention and attention Seq2Seq train and development loss over 20 epochs.</desc>
  <rect width="900" height="420" fill="#ffffff"/>
  <line x1="80" y1="340" x2="850" y2="340" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="40" x2="80" y2="340" stroke="#333" stroke-width="2"/>
  <text x="465" y="395" text-anchor="middle" font-family="Arial" font-size="16">Epoch</text>
  <text x="25" y="190" text-anchor="middle" font-family="Arial" font-size="16" transform="rotate(-90 25 190)">Loss</text>
  <text x="465" y="25" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Seq2Seq Recipe Generation Loss</text>
  <g font-family="Arial" font-size="12" fill="#333">
    <text x="56" y="344">1.8</text><text x="56" y="294">2.2</text><text x="56" y="244">2.6</text><text x="56" y="194">3.0</text><text x="56" y="144">3.4</text><text x="56" y="94">3.8</text><text x="56" y="44">4.2</text>
    <text x="80" y="360">1</text><text x="260" y="360">5</text><text x="460" y="360">10</text><text x="650" y="360">15</text><text x="835" y="360">20</text>
  </g>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="80" y1="290" x2="850" y2="290"/><line x1="80" y1="240" x2="850" y2="240"/><line x1="80" y1="190" x2="850" y2="190"/><line x1="80" y1="140" x2="850" y2="140"/><line x1="80" y1="90" x2="850" y2="90"/>
  </g>
  <polyline fill="none" stroke="#2563eb" stroke-width="3" points="80,52 121,160 162,191 203,209 244,222 285,232 326,239 367,245 408,250 449,255 490,259 531,263 572,266 613,269 654,272 695,274 736,276 777,278 818,280 850,282"/>
  <polyline fill="none" stroke="#60a5fa" stroke-width="3" stroke-dasharray="8 5" points="80,143 121,181 162,197 203,206 244,211 285,214 326,217 367,218 408,219 449,219 490,219 531,218 572,219 613,218 654,218 695,217 736,217 777,216 818,215 850,214"/>
  <polyline fill="none" stroke="#dc2626" stroke-width="3" points="80,77 121,194 162,229 203,249 244,263 285,274 326,282 367,289 408,295 449,300 490,305 531,309 572,313 613,316 654,319 695,322 736,325 777,327 818,329 850,331"/>
  <polyline fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="8 5" points="80,171 121,209 162,223 203,229 244,232 285,234 326,234 367,233 408,232 449,230 490,229 531,227 572,225 613,223 654,221 695,219 736,218 777,216 818,214 850,213"/>
  <g font-family="Arial" font-size="13" fill="#111">
    <rect x="610" y="55" width="220" height="86" fill="#fff" stroke="#ddd"/>
    <line x1="625" y1="76" x2="665" y2="76" stroke="#2563eb" stroke-width="3"/><text x="675" y="80">no_attention train</text>
    <line x1="625" y1="96" x2="665" y2="96" stroke="#60a5fa" stroke-width="3" stroke-dasharray="8 5"/><text x="675" y="100">no_attention dev</text>
    <line x1="625" y1="116" x2="665" y2="116" stroke="#dc2626" stroke-width="3"/><text x="675" y="120">attention train</text>
    <line x1="625" y1="136" x2="665" y2="136" stroke="#f97316" stroke-width="3" stroke-dasharray="8 5"/><text x="675" y="140">attention dev</text>
  </g>
</svg>
